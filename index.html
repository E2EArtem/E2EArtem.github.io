<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Telegram Web App Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Подключение Telegram Web App JS (они будут доступны внутри клиента Telegram) -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
    }
    button {
      font-size: 1rem;
      padding: 10px 20px;
      margin: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Telegram Web App Demo</h1>
  <button id="mainButton">Главная кнопка</button>
  <button id="backButton">Назад</button>

  <script>
    // Инициализация Telegram Web App
    const tg = window.Telegram.WebApp;

    // Включаем расширенный режим (если необходимо)
    tg.expand();

    // Устанавливаем текст для главной кнопки Telegram (как пример)
    tg.MainButton.setText("Подтвердить");

    // Обработчик для нашей локальной главной кнопки
    document.getElementById("mainButton").addEventListener("click", function() {
      // Пример действия: меняем текст главной кнопки Telegram и показываем её
      tg.MainButton.setText("Отправлено!");
      tg.MainButton.show();

      // Можно добавить дальнейшую логику, например, отправку данных серверу или закрытие чата
      // tg.sendData("Данные для отправки");
    });

    // Обработчик кнопки "Назад"
    document.getElementById("backButton").addEventListener("click", function() {
      // Пример действия: закрытие Web App
      tg.close();
      // Если необходимо, можно выполнить другую логику "назад"
    });

    // Пример обработчика нажатия на главную кнопку Telegram
    tg.onEvent("mainButtonClicked", function(){
      // Логика при нажатии на встроенную в Telegram главную кнопку
      console.log("Нажата главная кнопка Telegram");
    });
  </script>
</body>
</html>
