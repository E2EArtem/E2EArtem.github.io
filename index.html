<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Telegram Web App Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Подключение Telegram Web App JS (они будут доступны внутри клиента Telegram) -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
    }
    button {
      font-size: 1rem;
      padding: 10px 20px;
      margin: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Telegram Web App Demo</h1>
  <button id="mainButton">Главная кнопка</button>
  <button id="backButton">Назад</button>

  <script>
    // Инициализация Telegram Web App
    const tg = window.Telegram.WebApp;

    // Включаем расширенный режим (если необходимо)
    tg.expand();

    // Устанавливаем текст для главной кнопки Telegram (как пример)
    tg.MainButton.setText("Подтвердить");
    tg.MainButton.show();
    tg.BackButton.show();


    tg.MainButton.onClick(function() { 
      tg.showAlert("Хорошо, ты нажал на главную кнопку.");
});
    tg.onEvent('mainButtonClicked', function() {
  /* also */
});

tg.BackButton.onClick(function() {
  tg.showAlert("Нет пути назад!");
  
  tg.BackButton.hide();
});
tg.onEvent('backButtonClicked', function() {
  /* also */
});
  </script>
</body>
</html>
