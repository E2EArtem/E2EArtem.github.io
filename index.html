<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <script src="https://telegram.org/js/telegram-web-app.js?57"></script>
</head>
<body>
    <h1>Hello, Telegram!</h1>
    
    <form>
        <h2>Вопрос:</h2>
        <label>
            <input type="checkbox" name="option1"> Ответ 1
        </label><br>
        <label>
            <input type="checkbox" name="option2"> Ответ 2
        </label><br>
        <label>
            <input type="checkbox" name="option3"> Ответ 3
        </label><br>
        <label>
            <input type="checkbox" name="option4"> Ответ 4
        </label><br>
        <button type="submit">Сдать</button>
    </form>
</body>

<script>

    
var WebApp = window.Telegram.WebApp;

WebApp.showAlert(`Добро пожаловать, @${WebApp.WebAppUser.username}.`);

var MainButton = WebApp.MainButton;
var BackButton = WebApp.BackButton;

MainButton.show();
BackButton.show();

MainButton.onClick(function() {
  WebApp.showAlert("Хорошо, ты нажал на главную кнопку.");
});
WebApp.onEvent('mainButtonClicked', function() {
  /* also */
});

BackButton.onClick(function() {
  WebApp.showAlert("Нет пути назад!");
  
  BackButton.hide();
});
WebApp.onEvent('backButtonClicked', function() {
  /* also */
});


    

</script>


    
</html>
