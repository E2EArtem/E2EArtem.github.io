<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Telegram Web App Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Подключение Telegram Web App JS (они будут доступны внутри клиента Telegram) -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--tg-theme-text-color);
            background: var(--tg-theme-bg-color);
        }

        .main {
            width: 100%;
            padding: 25px;
            text-align: center;
        }

        h1 {
            margin-top: 40px;
            margin-bottom: 10px;
        }

        img {
            width: 70px;
            margin: 30px auto;
        }

        .btn {
            border: 0;
            border-radius: 5px;
            margin-top: 50px;
            height: 60px;
            width: 200px;
            font-style: 20px;
            font-weight: 500;
            cursor: pointer;
            color: var(--tg-theme-button-text-color);
            background: var(--tg-theme-button-color);
        }

        form {
            text-align: center;
        }

        input {
            outline: none;
            border-radius: 5px;
            border: 2px solid var(--tg-theme-button-color);
            padding: 15px 10px;
            margin: 10px 0 0;
            background: var(--tg-theme-section-separator-color);
            color: var(--tg-theme-text-color);
            transition: all .2s;
        }

            input:focus {
                border-color: var(--tg-theme-secondary-bg-color)
            }

        hr {
            border: 1px solid var(--tg-theme-hint-color);
        }



        .checkbox-container {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }
        /* Сетка для 2 столбцов */
        .checkbox-grid {
            display: flex;
            /*flex-wrap: wrap;*/
            flex-direction: column;
            gap: 10px;
        }
        /* Элемент каждого чекбокса, теперь используется <label> */
        .checkbox-item {
            width: calc(50% - 10px);
            background-color: var(--tg-theme-secondary-bg-color);
            padding: 10px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            cursor: pointer;
            border-radius: 4px; /* Если нужен border-radius для всего блока */
        }
            /* Стилизация чекбокса */
            .checkbox-item input[type="checkbox"] {
                transform: scale(1.5);
                margin: auto;
                border: 1px solid var(--tg-theme-hint-color);
                /* Убираем лишние стили браузера для абсолютного контроля (опционально) */
                cursor: pointer;
            }
        /* Текст, выровненный по центру */
        .checkbox-label {
            flex-grow: 1;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="main">

        <div id="DynamicContainer">
            <h1 id="QE">Тестирование</h1>
            <hr>
            <div>Для начала теста нажмите Начать тест</div>
        </div>

    </div>



    <script>


        const tg = window.Telegram.WebApp;

        // Включаем расширенный режим (если необходимо)
        tg.expand();



        // Устанавливаем текст для главной кнопки Telegram (как пример)

        tg.MainButton.setText("Начать тест");
        tg.MainButton.show();

        router = 0;


        




        tg.BackButton.onClick(function () {
            tg.MainButton.setText("Начать тест");
            tg.BackButton.hide();
            document.getElementById('DynamicContainer').innerHTML = templates[0];
            router = 0;
        });



        const templates = [
            `
            <h1 id="QE">ТЕОРЕТИЧЕСКИЕ ВОПРОСЫ С ОТВЕТАМИ ДЛЯ ПРОВЕДЕНИЯ ТЕОРЕТИЧЕСКОЙ ЧАСТИ ИТОГОВОЙ АТТЕСТАЦИИ И ПРОВЕРКИ ЗНАНИЯ ПРАВИЛ БЕЗОПАСНОГО ОБРАЩЕНИЯ С ОРУЖИЕМ</h1>
            <hr>
            <div>Для начала теста нажмите Начать тест</div>
      `,
            `
<h1 id="QE">Вопрос 1</h1>
  <hr>
  <div class="checkbox-container">
    <div class="checkbox-grid">
      <label class="checkbox-item" for="an1">
        <input type="checkbox" id="an1" name="option1" value="1">
        <span class="checkbox-label id="an1txt">Ответ 1</span>
      </label>
      <label class="checkbox-item" for="an2">
        <input type="checkbox" id="an2" name="option2" value="2">
        <span class="checkbox-label id="an2txt">Ответ 2</span>
      </label>
      <label class="checkbox-item" for="an3">
        <input type="checkbox" id="an3" name="option3" value="3">
        <span class="checkbox-label id="an3txt">Ответ 3</span>
      </label>
    </div>
  </div>
`
        ];


        const csvURL = 'questions.csv';
        let dataobject;

        // Функция для обработки загруженного CSV с помощью PapaParse
        function parseCSV(data) {
            Papa.parse(data, {
                header: true, // если CSV содержит строку заголовков
                dynamicTyping: true, // автоматически преобразует числовые значения в числа
                complete: function (results) {
                    dataobject = results.data;
                },
                error: function (err) {
                    console.error("Ошибка парсинга: ", err);
                }
            });
        }

        // Функция для загрузки CSV файла по URL
        function downloadCSV(url) {
            fetch(url)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`Ошибка при получении CSV: ${response.status} ${response.statusText}`);
                    }
                    return response.text();
                })
                .then(csvData => {
                    parseCSV(csvData);
                })
                .catch(error => {
                    console.error("Ошибка загрузки: ", error);
                });
        }

        // Запуск загрузки CSV
        downloadCSV(csvURL);



        tg.MainButton.onClick(function () {
            //tg.showAlert("Хорошо, ты нажал на главную кнопку");

            if (router == 0) {
                tg.BackButton.show();
                tg.MainButton.setText("Далее");
                document.getElementById('DynamicContainer').innerHTML = templates[1];
            }
            if (router == (templates.length - 1)) {
                tg.MainButton.setText("Начать тест");
                tg.BackButton.hide();
                document.getElementById('DynamicContainer').innerHTML = templates[0];
                router = 0;
                return;
            }


            document.getElementById('QE').innerHTML = dataobject[router].question;
            document.getElementById('an1txt').innerHTML = dataobject[router].first;
            document.getElementById('an2txt').innerHTML = dataobject[router].second;
            document.getElementById('an3txt').innerHTML = dataobject[router].third;


            router = router + 1;

        });


    </script>


</body>
</html>
