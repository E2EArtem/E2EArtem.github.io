<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Telegram Web App Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Подключение Telegram Web App JS (они будут доступны внутри клиента Telegram) -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--tg-theme-text-color);
            background: var(--tg-theme-bg-color);
        }

        .main {
            width: 100%;
            padding: 25px;
            text-align: center;
        }

        h1 {
            margin-top: 40px;
            margin-bottom: 10px;
        }

        img {
            width: 70px;
            margin: 30px auto;
        }

        .btn {
            border: 0;
            border-radius: 5px;
            margin-top: 50px;
            height: 60px;
            width: 200px;
            font-style: 20px;
            font-weight: 500;
            cursor: pointer;
            color: var(--tg-theme-button-text-color);
            background: var(--tg-theme-button-color);
        }

        form {
            text-align: center;
        }

        input {
            outline: none;
            border-radius: 5px;
            border: 2px solid var(--tg-theme-button-color);
            padding: 15px 10px;
            margin: 10px 0 0;
            background: var(--tg-theme-section-separator-color);
            color: var(--tg-theme-text-color);
            transition: all .2s;
        }

        input:focus {
            border-color: var(--tg-theme-secondary-bg-color)
        }

        hr {
            border: 1px solid var(--tg-theme-hint-color);
        }



        .checkbox-container {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }
        /* Сетка для 2 столбцов */
        .checkbox-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        /* Элемент каждого чекбокса, теперь используется <label> */
        .checkbox-item {
            width: calc(50% - 10px);
            background-color: var(--tg-theme-secondary-bg-color);
            padding: 10px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            cursor: pointer;
            border-radius: 4px; /* Если нужен border-radius для всего блока */
        }
            /* Стилизация чекбокса */
        .checkbox-item input[type="checkbox"] {
            transform: scale(1.5);
            margin: auto;
            border: 1px solid var(--tg-theme-hint-color);
            /* Убираем лишние стили браузера для абсолютного контроля (опционально) */
            cursor: pointer;
        }
        /* Текст, выровненный по центру */
        .checkbox-label {
            flex-grow: 1;
            text-align: center;
        }



    </style>
</head>
<body>
    <div class="main">

        <div id="DynamicContainer">
            <h1 id="QE">Тестирование</h1>
            <hr>
            <div>Для начала теста нажмите Начать тест</div>
        </div>

    </div>



    <script>


        const tg = window.Telegram.WebApp;

        // Включаем расширенный режим (если необходимо)
        tg.expand();



        // Устанавливаем текст для главной кнопки Telegram (как пример)

        tg.MainButton.setText("Начать тест");
        tg.MainButton.show();

        router = 0;


        tg.MainButton.onClick(function () {
            //tg.showAlert("Хорошо, ты нажал на главную кнопку");
            
            if (router == 0) {
                tg.BackButton.show();
                tg.MainButton.setText("Далее");
            }
            if (router == (templates.length-1)) {
                tg.MainButton.setText("Начать тест");
                tg.BackButton.hide();
                document.getElementById('DynamicContainer').innerHTML = templates[0];
                router = 0;
                return;
            }
            
            document.getElementById('DynamicContainer').innerHTML = templates[router + 1];
            router = router + 1;
            
        });




        tg.BackButton.onClick(function () {
            tg.MainButton.setText("Начать тест");
            tg.BackButton.hide();
            document.getElementById('DynamicContainer').innerHTML = templates[0];
            router = 0;
        });



        const templates = [
            `
        <h1 id="QE">Тестирование</h1>
        <hr>
        <div>Для начала теста нажмите Начать тест</div>
  `,
            `
<h1 id="QE">Вопрос 1</h1>
<hr>
<div class="checkbox-container">
    <div class="checkbox-grid">
        <label class="checkbox-item" for="cb1">
            <input type="checkbox" id="cb1" name="option1" value="1">
            <span class="checkbox-label">Опция 1</span>
        </label>
        <label class="checkbox-item" for="cb2">
            <input type="checkbox" id="cb2" name="option2" value="2">
            <span class="checkbox-label">Опция 2</span>
        </label>
        <label class="checkbox-item" for="cb3">
            <input type="checkbox" id="cb3" name="option3" value="3">
            <span class="checkbox-label">Опция 3</span>
        </label>
        <label class="checkbox-item" for="cb4">
            <input type="checkbox" id="cb4" name="option4" value="4">
            <span class="checkbox-label">Опция 4</span>
        </label>
    </div>
</div>
`, `
<h1 id="QE">Вопрос 2</h1>
<hr>
<div class="checkbox-container">
    <div class="checkbox-grid">
        <label class="checkbox-item" for="cb1">
            <input type="checkbox" id="cb1" name="option1" value="1">
            <span class="checkbox-label">Answer 1</span>
        </label>
        <label class="checkbox-item" for="cb2">
            <input type="checkbox" id="cb2" name="option2" value="2">
            <span class="checkbox-label">Answer 2</span>
        </label>
        <label class="checkbox-item" for="cb3">
            <input type="checkbox" id="cb3" name="option3" value="3">
            <span class="checkbox-label">Answer 3</span>
        </label>
        <label class="checkbox-item" for="cb4">
            <input type="checkbox" id="cb4" name="option4" value="4">
            <span class="checkbox-label">Answer 4</span>
        </label>
    </div>
</div>
`, `
<h1 id="QE">Вопрос 3</h1>
<hr>
<div class="checkbox-container">
    <div class="checkbox-grid">
        <label class="checkbox-item" for="cb1">
            <input type="checkbox" id="cb1" name="option1" value="1">
            <span class="checkbox-label">Ответ 1</span>
        </label>
        <label class="checkbox-item" for="cb2">
            <input type="checkbox" id="cb2" name="option2" value="2">
            <span class="checkbox-label">Ответ 2</span>
        </label>
        <label class="checkbox-item" for="cb3">
            <input type="checkbox" id="cb3" name="option3" value="3">
            <span class="checkbox-label">Ответ 3</span>
        </label>
        <label class="checkbox-item" for="cb4">
            <input type="checkbox" id="cb4" name="option4" value="4">
            <span class="checkbox-label">Ответ 4</span>
        </label>
    </div>
</div>
`
        ];







    </script>


</body>
</html>
